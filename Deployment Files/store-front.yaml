apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front-deployment
  labels:
    app: store-front
spec:
  replicas: 2
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      containers:
      - name: store-front
        image: harshdeep1230/bbuy-final-store-front:latest
        ports:
        - containerPort: 80
